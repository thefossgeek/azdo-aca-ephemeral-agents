parameters:
  - name: imageName      # alpine | ubuntu24
    type: string
  - name: acrName        # without .azurecr.io
    type: string
  - name: acrMiClientId  # client ID of the managed identity with ACR Contributor access
    type: string

steps:
  - script: |
      TAG="$(date +%Y%m%d)-$(echo $(Build.SourceVersion) | cut -c1-8)"
      echo "Image tag: $TAG"
      echo "##vso[task.setvariable variable=IMAGE_TAG]$TAG"
    displayName: Compute image tag

  - script: |
      az login --identity --client-id "${{ parameters.acrMiClientId }}"
    displayName: Authenticate with ACR managed identity

  - script: |
      cd 01azdo-agent-container-images/${{ parameters.imageName }}
      ./download-agent.sh
      az acr build \
        --registry ${{ parameters.acrName }} \
        --image azp-agent/${{ parameters.imageName }}:$(IMAGE_TAG) \
        --platform linux/amd64 \
        --file Dockerfile \
        .
    displayName: Build and push ${{ parameters.imageName }}:$(IMAGE_TAG)
